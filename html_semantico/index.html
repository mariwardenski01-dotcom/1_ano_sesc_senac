<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Semântico</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="container-pricipal">
    <header class="cabecalho">
        <h1>Header (Cabeçalho)</h1>
    </header>

    <main class="conteudo-principal">
       <nav class="menu-navegacao">
          <h1 class="text-vertical exercicio-1" >Nav (Menu de Navegação)</h1>
       </nav> 
       
       <section class="sessao-principal">
         <div class="article-div">
            <article class="article-1">
                <h1>Article 1</h1>
            </article>
            <article class="article-2">
                <h1>Article 2</h1>
            </article>
            <article class="article-3">
                <h1>Article 3</h1>
            </article>
         </div>

         <div class="data">
            <time datetime="2026-05-25">25 de maio de 2026</time>
            <figure class="figura">
                <img class="imagem" src="assets/image/catedral_centro_sjp 3.png" alt="Catedral do centro de São José dos Pinais-PR.">
                <figcaption class="descricao">Foto de vista aérea da catedral do centro de São José dos Pinhais-PR.</figcaption>
                <P>Lorem ipsum sit amet <mark class="destaque"> consectetur </mark> adipisicing alit.</P>
            </figure>
         </div>
       </section>

       <aside class="anuncio">
        <h1 class="text-vertical">Aside (Anúncios, links secundários, etc...)</h1>
       </aside> 
    </main>

    <footer class="rodape">
        <h1>Footer (Rodapé)</h1>
        <address class="contato">teste@testando.com</address>
    </footer>
</body>
</html>
